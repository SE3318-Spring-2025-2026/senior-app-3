openapi: 3.0.0
info:
  title: Senior Project Management System API
  version: 1.0.0
servers:
  - url: /api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:

  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                studentId:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  token:
                    type: string

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /auth/password-reset:
    post:
      summary: Request password reset
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        "200":
          description: Reset link sent

  /groups:
    post:
      summary: Create group
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupName:
                  type: string
      responses:
        "200":
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  groupId:
                    type: string

  /groups/{groupId}/join:
    post:
      summary: Join group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Join request status

  /groups/{groupId}/approve:
    post:
      summary: Approve student to group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                studentId:
                  type: string
      responses:
        "200":
          description: Approved

  /integrations/github:
    post:
      summary: Setup GitHub integration
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                repoUrl:
                  type: string
                accessToken:
                  type: string

  /integrations/jira:
    post:
      summary: Setup JIRA integration
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                projectKey:
                  type: string
                apiToken:
                  type: string

  /advisors/request:
    post:
      summary: Request advisor
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                advisorId:
                  type: string
                groupId:
                  type: string

  /advisors/approve:
    post:
      summary: Approve advisor
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string

  /committees:
    post:
      summary: Assign committee
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                members:
                  type: array
                  items:
                    type: string

  /deliverables:
    post:
      summary: Submit deliverable
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                fileUrl:
                  type: string
                version:
                  type: number

  /deliverables/{id}:
    put:
      summary: Resubmit deliverable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fileUrl:
                  type: string

  /deliverables/{id}/comments:
    post:
      summary: Add review comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string

  /evaluations:
    post:
      summary: Submit evaluation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deliverableId:
                  type: string
                scores:
                  type: array
                  items:
                    type: object
                    properties:
                      criterion:
                        type: string
                      score:
                        type: number

  /evaluations/{deliverableId}:
    get:
      summary: Get evaluation
      parameters:
        - name: deliverableId
          in: path
          required: true
          schema:
            type: string

  /rubrics:
    post:
      summary: Configure rubrics
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                criteria:
                  type: array
                  items:
                    type: string
                weights:
                  type: array
                  items:
                    type: number

  /integrations/github/data:
    get:
      summary: Fetch GitHub contribution data

  /integrations/jira/data:
    get:
      summary: Fetch JIRA sprint data

  /contributions/calculate:
    post:
      summary: Calculate contribution scores

  /grades/calculate:
    post:
      summary: Calculate final grades

  /grades/{studentId}:
    get:
      summary: Get student final grade
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string

  /reports:
    get:
      summary: Generate reports